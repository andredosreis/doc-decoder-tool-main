name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancela runs antigos no mesmo PR/branch quando aparece novo commit;
# poupa CI minutes em iterações rápidas.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-frontend:
    name: Frontend tests (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run vitest
        run: npx vitest run

  test-functions:
    name: Edge Functions tests (deno test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Deno (latest stable)
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run deno test
        run: deno task test:functions

  type-check:
    name: TypeScript type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tsc
        # `-b` (build mode) é necessário porque o tsconfig.json root usa
        # project references (`tsconfig.app.json` + `tsconfig.node.json`).
        # `--noEmit` confirma que só queremos type-check, sem output.
        run: npx tsc -b --noEmit

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        # Configurado para falhar em errors apenas; warnings (ex:
        # `no-explicit-any` em código legado) são informativos no diff.
        run: npm run lint

  build:
    name: Production build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        # `vite build` usa `@vitejs/plugin-react-swc`, que carrega o binário
        # nativo `@swc/core-linux-x64-gnu` (instalado via optionalDependencies
        # em ubuntu-latest).
        run: npm run build
